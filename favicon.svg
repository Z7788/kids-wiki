<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="nuc" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="55%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ff4757"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a2150"/>
      <stop offset="80%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#060820"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- subtle stars -->
  <circle cx="18" cy="22" r="0.9" fill="#ffffff" opacity="0.6"/>
  <circle cx="80" cy="18" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="82" cy="78" r="0.9" fill="#ffffff" opacity="0.6"/>
  <circle cx="20" cy="82" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="50" cy="10" r="0.6" fill="#ffffff" opacity="0.45"/>
  <!-- orbits -->
  <ellipse cx="50" cy="50" rx="40" ry="14" fill="none" stroke="#4ecdc4" stroke-width="2.5" opacity="0.9"/>
  <ellipse cx="50" cy="50" rx="40" ry="14" fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.9" transform="rotate(60 50 50)"/>
  <ellipse cx="50" cy="50" rx="40" ry="14" fill="none" stroke="#ff6b9d" stroke-width="2.5" opacity="0.9" transform="rotate(120 50 50)"/>
  <!-- glow behind nucleus -->
  <circle cx="50" cy="50" r="18" fill="#ff8c42" opacity="0.5" filter="url(#glow)"/>
  <!-- nucleus -->
  <circle cx="50" cy="50" r="13" fill="url(#nuc)"/>
</svg>
